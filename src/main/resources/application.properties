spring.application.name=SpringSecurityJWT
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT}
spring.jpa.properties.hibernate.default_column_length=500
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#mostrar sql que se esta ejecuntando
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder= TRACE

#Permisos de cors

spring.web.cors.allow-credentials=true
spring.web.cors.allowed-origin-patterns=http://localhost:3000/**
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

#JWT

jwt.secret.key = ${JWT_SECRET}
jwt.time.expiration= ${JWT_EXPIRATION}