spring.application.name=SpringSecurityJWT
spring.datasource.url=jdbc:mysql://localhost/almacen_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrival=true
#Cambiar username y password por el tuyo de bd
spring.datasource.username=piero
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto= update
#mostrar sql que se esta ejecuntando
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder= TRACE
spring.jpa.show-sql=true

#Permisos de cors

spring.web.cors.allow-credentials=true
spring.web.cors.allowed-origin-patterns=http://localhost:3000/**
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

